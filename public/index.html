<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>节操新番导视 · 评论收集</title>
  <link rel="stylesheet" href="/styles.css">
</head>

<body>
  <div class="app">
    <!-- 左侧编辑区 -->
    <div class="editor-panel">
      <div class="header">
        <h1>🎬 节操新番导视 · 评论收集</h1>
        <p class="subtitle">输入QQ号获取头像，添加评论后可实时预览效果</p>
      </div>

      <div class="toolbar">
        <div class="fetch-group">
          <input type="text" id="seasonInput" value="202607" placeholder="季度代码，如 202607">
          <button id="fetchBtn">从 yuc.wiki 抓取</button>
        </div>
        <button id="batchAddBtn">批量添加番剧</button>
        <button id="loadJsonBtn">导入评论</button>
        <button id="saveJsonBtn">导出评论</button>
        <button id="clearAllBtn" class="danger-btn">清除全部</button>
      </div>

      <!-- 默认评论者设置 -->
      <div class="default-commenter-bar">
        <div class="default-commenter">
          <span class="dc-label">默认信息：</span>
          <input type="text" id="defaultName" placeholder="昵称" class="dc-name">
          <input type="text" id="defaultQQ" placeholder="QQ号" class="dc-qq">
          <span id="defaultAvatarStatus" class="dc-avatar-status">未设置QQ号</span>
          <button id="fetchDefaultAvatar" class="dc-fetch-qq-avatar">获取头像</button>
          <button id="clearDefault" class="dc-clear">清除</button>
        </div>
      </div>

      <div id="loading" class="loading" style="display:none;">
        <div class="spinner"></div>
        <span id="loadingText">正在加载...</span>
      </div>

      <!-- 番剧列表 -->
      <div id="animeList" class="anime-list"></div>
    </div>

    <!-- 右侧预览区 -->
    <div class="preview-panel">
      <div id="previewContainer">
        <div class="preview-placeholder">点击"预览"查看生成效果</div>
      </div>
    </div>
  </div>

  <!-- 日志区 -->
  <div class="log-container">
    <div id="log" class="log"></div>
  </div>

  <script src="/app.js"></script>
</body>

</html>
